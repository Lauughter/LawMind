# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lawmind?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      database: 0
      jedis:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

langchain4j:
  dashscope:
    chat-model:
      api-key: ${DASHSCOPE_API_KEY:}
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: ${DASHSCOPE_API_KEY:}
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY:}
      model-name: text-embedding-v2
      log-requests: true
      log-responses: true
      max-segments-per-batch: 10

logging:
  level:
    dev.langchain4j: DEBUG
    com.lhs.lawmind: DEBUG
