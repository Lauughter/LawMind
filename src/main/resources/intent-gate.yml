# ============================================================
# 意图识别门控配置（Intent Gate Configuration）
# ============================================================
# 用途：在 Agent 循环启动前完成领域判断、意图分类、路由决策。
# 支持纯规则模式（rule-only: true），零 LLM 调用，适合开发测试。

lawmind:
  agent:
    gate:
      # 纯规则模式：true = 不调用 LLM 兜底，仅靠关键词规则判断
      rule-only: false

      # ---------- Layer 1: 领域门控（DomainGate） ----------
      domain:
        # 法律核心关键词库（规则命中 → 直接通过，置信度 0.95）
        legal-keywords:
          - 合同
          - 劳动
          - 劳动法
          - 劳动合同
          - 工伤
          - 赔偿
          - 婚姻
          - 离婚
          - 继承
          - 遗产
          - 刑事
          - 犯罪
          - 诉讼
          - 起诉
          - 仲裁
          - 法院
          - 法官
          - 律师
          - 法条
          - 法律
          - 法规
          - 司法
          - 判决
          - 裁定
          - 执行
          - 债务
          - 债权
          - 侵权
          - 违约
          - 行政处罚
          - 税收
          - 社保
          - 公积金
          - 仲裁裁决
          - 知识产权
          - 专利
          - 商标
          - 著作权
          - 公司法
          - 股权
          - 破产
          - 重整
          - 担保
          - 抵押
          - 质押
          - 保证
          - 房产
          - 拆迁
          - 征收
          - 物业
          - 消费者权益
          - 食品安全
          - 医疗事故
          - 交通事故
          - 保险
          - 保险法
          - 票据
          - 信托
          - 基金
          - 证券
          - 反垄断
          - 反不正当竞争
          - 环境保护
          - 土地管理
          - 招标
          - 投标
          - 政府采购
          - 民法典
          - 刑法
          - 治安管理
          - 治安处罚
          - 刑事拘留
          - 取保候审
          - 盗窃
          - 抢劫
          - 诈骗
          - 贪污
          - 受贿
          - 挪用公款

        # 非法律主题词库（规则命中 → 直接拒绝，置信度 0.95）
        non-legal-keywords:
          - 天气
          - 游戏
          - 电影
          - 音乐
          - 美食
          - 旅游
          - 运动
          - 健身
          - 美妆
          - 护肤
          - 穿搭
          - 宠物
          - 星座
          - 算命
          - 塔罗
          - 股票推荐
          - 基金推荐
          - 虚拟货币
          - 炒币
          - 彩票
          - 赌博
          - 色情
          - 暴力
          - 政治敏感

        # LLM 兜底判断 prompt（仅对模糊边界问题调用，~50 tokens）
        llm-prompt: "请判断以下问题是否涉及中国法律领域（包括法律咨询、法条查询、案例分析、法律知识问答、文书起草、法律程序等）。仅回答"是"或"否"。\n问题："

      # ---------- Layer 2: 意图细分（IntentClassifierEnhanced） ----------
      intent:
        # 每种意图的关键词规则（按优先级从高到低匹配）
        article-lookup-keywords:
          - 第几条规定
          - 第几条
          - 法条原文
          - 法条内容
          - 哪一条法律
          - 法律条文
          - 查法条
          - 哪个法条
          - 什么法条
          - 法条是
          - 法律规定是什么
          - 法律如何规定
          - 法律怎么规定
          - 条文内容
          - 条款规定
          - 法条查询
          - 法律原文

        calculation-keywords:
          - 赔偿多少钱
          - 赔偿多少
          - 赔多少钱
          - 赔偿金
          - 赔偿标准
          - 赔偿金额
          - 计算赔偿
          - 赔多少
          - 工伤赔偿
          - 经济补偿金
          - 加班费怎么算
          - 诉讼费多少
          - 抚养费多少
          - 赡养费多少
          - 怎么算
          - 计算公式
          - 金额计算
          - 补偿标准
          - 应该赔
          - 能赔多少

        case-search-keywords:
          - 有没有类似案例
          - 类似案例
          - 判例
          - 判决案例
          - 类似案件
          - 别人怎么判
          - 参考案例
          - 案例检索
          - 有没有判过
          - 法院怎么判
          - 胜诉率
          - 案例
          - 判决书
          - 裁判文书

        document-drafting-keywords:
          - 怎么写起诉状
          - 起诉状模板
          - 起诉状格式
          - 帮我写起诉状
          - 起诉状范文
          - 写一份合同
          - 合同模板
          - 帮我写合同
          - 怎样写答辩状
          - 答辩状模板
          - 劳动仲裁申请书
          - 仲裁申请怎么写
          - 帮我起草
          - 帮我写一份
          - 协议模板
          - 协议书怎么写
          - 借条怎么写
          - 欠条怎么写
          - 离婚协议怎么写
          - 遗嘱怎么写
          - 帮我草拟
          - 法律文书
          - 格式文书

        legal-knowledge-keywords:
          - 什么是
          - 是什么意思
          - 名词解释
          - 法律概念
          - 指的是什么
          - 定义是什么
          - 含义
          - 怎么理解
          - 通俗解释
          - 普法

        contract-review-keywords:
          - 审查合同
          - 合同审查
          - 审合同
          - 帮我看看合同
          - 分析合同
          - 合同风险评估
          - 合同是否合法
          - 合同是否公平
          - 帮我审一下
          - 帮我审核

        # LLM 意图分类 prompt（仅对关键词未命中的问题调用，~60 tokens）
        llm-prompt: "请将以下法律问题分类为以下类型之一（仅输出类型名称）：ARTICLE_LOOKUP（法条查询）、LEGAL_CONSULTATION（法律咨询）、CALCULATION（金额计算）、CASE_SEARCH（案例检索）、DOCUMENT_DRAFTING（文书起草）、LEGAL_KNOWLEDGE（法律知识问答）、CONTRACT_REVIEW（合同审查）。\n问题："

      # ---------- Layer 3: 复杂度评估 + 路由决策 ----------
      complexity:
        # 多因子权重
        involved-laws-weight: 0.4
        calculation-needed-weight: 0.2
        question-clauses-weight: 0.2
        procedure-involved-weight: 0.2
        # 复杂度阈值
        simple-threshold: 0.35
        complex-threshold: 0.65

        # 复杂法律关键词（命中越多复杂度越高）
        complex-law-keywords:
          - 刑法
          - 刑事
          - 知识产权
          - 破产
          - 重整
          - 反垄断
          - 证券
          - 信托
          - 公司
          - 股权
          - 跨国
          - 涉外
          - 行政诉讼法

        # 涉及程序的关键词
        procedure-keywords:
          - 怎么起诉
          - 起诉流程
          - 仲裁流程
          - 诉讼程序
          - 怎么申请
          - 需要什么材料
          - 去哪里
          - 管辖权
          - 时效
          - 上诉
          - 再审
          - 申诉
          - 行政复议
          - 强制执行

      # ---------- 路由决策矩阵 ----------
      route:
        # 意图 → 复杂度 → 通道映射
        # fast-agent-threshold: 低于此复杂度的走 FAST，否则走 AGENT
        fast-agent-threshold: 0.5

        # 以下意图默认走快速通道（与复杂度无关）
        fast-intents:
          - ARTICLE_LOOKUP
          - LEGAL_KNOWLEDGE

        # 以下意图默认走 Agent 通道（与复杂度无关）
        agent-intents:
          - LEGAL_CONSULTATION
          - CONTRACT_REVIEW

        # 以下意图走混合通道
        hybrid-intents:
          - DOCUMENT_DRAFTING

      # ---------- 分级拒绝响应模板 ----------
      reject-responses:
        # 场景1：完全无关（天气、游戏、美食等非法律主题词命中）
        completely-unrelated: "您好！我是 LawMind 法律智能助手，专注于中国法律领域的咨询与服务。您的问题似乎不属于法律范畴，我无法提供有效的帮助。如果您有法律相关问题（如劳动纠纷、婚姻家庭、合同争议、刑事辩护等），欢迎随时向我提问。"
        # 场景2：擦边球（涉及"法律"字眼但非法律问题，如"法律电影推荐"）
        borderline-non-legal: "您好！您的问题虽然提到了法律相关内容，但似乎更偏向于非法律咨询领域。作为法律专业助手，我建议您就具体的法律问题（如法规解读、案例分析、维权途径等）向我咨询，我将竭诚为您服务。"
        # 场景3：格式异常（空字符串、纯符号、乱码等）
        malformed-input: "您好！您输入的内容格式似乎不太规范，我无法准确理解您的问题。请用清晰、完整的中文句子描述您的法律问题，我将为您提供专业的分析和建议。"
        # 场景4：敏感内容（政治敏感、色情暴力等）
        sensitive-content: "您好！您的问题涉及敏感内容，超出了我能处理的范围。作为法律智能助手，我只能就中国法律允许范围内的法律问题进行解答。如有法律相关问题，请重新表述后向我提问。"
