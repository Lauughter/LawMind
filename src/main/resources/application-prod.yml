# 生产环境配置 — 所有敏感信息通过环境变量注入
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      jedis:
        pool:
          enabled: true
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 5000ms

langchain4j:
  dashscope:
    chat-model:
      api-key: ${DASHSCOPE_API_KEY}
      model-name: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
      log-requests: false
      log-responses: false
    streaming-chat-model:
      api-key: ${DASHSCOPE_API_KEY}
      model-name: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
      log-requests: false
      log-responses: false
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY}
      model-name: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v2}
      log-requests: false
      log-responses: false
      max-segments-per-batch: 10

logging:
  level:
    dev.langchain4j: WARN
    com.lhs.lawmind: INFO
